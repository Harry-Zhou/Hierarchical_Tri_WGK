# CSG-Transformer Graph Classification Configuration

# Model parameters
model:
  hidden_dim: 128
  num_layers: 3
  num_heads: 4
  dropout: 0.2
  L: 3
  T: 3
  I: 5
  task: graph_classification
  use_virtual_node: true
  use_rel_bias: true

# Training parameters
training:
  lr: 0.001
  weight_decay: 0.0001
  epochs: 200
  patience: 30
  min_delta: 0.0001
  batch_size: 64
  lambda_reg: 0.0001
  warmup_epochs: 10
  grad_clip: 1.0
  drop_edge_rate: 0.1
  use_ema: false
  ema_decay: 0.999
  kd_temperature: 4.0
  kd_weight: 0.5

# Dataset parameters
dataset:
  name: MUTAG
  root: ./data
  train_ratio: 0.8
  val_ratio: 0.1
  use_rewiring: false
  rewiring_alpha: 0.15

# Evaluation parameters
evaluation:
  metrics:
    - accuracy
    - auc_roc
    - f1_macro
    - precision_macro
    - recall_macro
  num_runs: 10

# Hardware parameters
hardware:
  device: auto
  num_workers: 4
