# CSG-Transformer Node Classification Configuration

# Model parameters
model:
  hidden_dim: 128
  num_layers: 3
  num_heads: 4
  dropout: 0.1
  L: 2
  T: 2
  I: 3
  task: node_classification

# Training parameters
training:
  lr: 0.01
  weight_decay: 0.0005
  epochs: 200
  patience: 50
  min_delta: 0.001
  batch_size: 1
  lambda_reg: 0.0005

# Dataset parameters
dataset:
  name: Cora
  root: ./data

# Evaluation parameters
evaluation:
  metrics:
    - accuracy
    - auc_roc
    - f1_macro
    - precision_macro
    - recall_macro
  mask: test_mask

# Hardware parameters
hardware:
  device: auto
  num_workers: 4
